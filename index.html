<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NSB Website Prototypes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;

      min-height:100vh;

      display:flex;
      flex-direction:column;
      justify-content:space-between;

      background:
      radial-gradient(circle at top left,#312e81 0%,transparent 30%),
      radial-gradient(circle at bottom right,#0891b2 0%,transparent 30%),
      #050816;

      color:white;

      overflow-x:hidden;
    }

    header{
      text-align:center;
      padding:80px 20px 50px;
    }

    header h1{
      font-size:clamp(3rem,7vw,5rem);
      font-weight:800;

      letter-spacing:-2px;

      margin-bottom:18px;

      background:
      linear-gradient(
        90deg,
        #ffffff,
        #c4b5fd,
        #67e8f9
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    header p{
      color:#b6c2d9;
      font-size:1.1rem;
    }

    .container{
      width:100%;
      max-width:1800px;

      margin:auto;

      display:flex;
      justify-content:center;
      gap:40px;
      flex-wrap:wrap;

      padding:20px 40px 80px;
    }

    .card{
      width:520px;
      min-height:340px;

      background:
      linear-gradient(
        145deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.03)
      );

      border:1px solid rgba(255,255,255,0.08);

      border-radius:36px;

      padding:50px 40px;

      text-align:center;

      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:42px;

      box-shadow:
      0 20px 50px rgba(0,0,0,.35);

      transition:.4s ease;

      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";

      position:absolute;
      inset:0;

      background:
      linear-gradient(
        135deg,
        rgba(124,58,237,.18),
        rgba(6,182,212,.15),
        transparent
      );

      opacity:0;

      transition:.4s ease;
    }

    .card:hover::before{
      opacity:1;
    }

    .card:hover{
      transform:
      translateY(-12px)
      scale(1.03);

      border-color:
      rgba(255,255,255,.16);

      box-shadow:
      0 30px 70px rgba(124,58,237,.28);
    }

    .card h2{
      position:relative;
      z-index:2;

      font-size:2.3rem;
      font-weight:800;

      line-height:1.1;

      letter-spacing:-2px;

      background:
      linear-gradient(
        90deg,
        #ffffff,
        #c4b5fd
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .card a{
      position:relative;
      z-index:2;

      display:inline-flex;
      align-items:center;
      justify-content:center;

      padding:18px 40px;

      border-radius:18px;

      text-decoration:none;

      font-weight:700;
      font-size:1.3rem;

      color:white;

      background:
      linear-gradient(
        135deg,
        #7c3aed,
        #60a5fa
      );

      box-shadow:
      0 12px 30px rgba(124,58,237,.45);

      transition:.35s ease;
    }

    .card a:hover{
      transform:translateY(-2px);

      box-shadow:
      0 14px 34px rgba(124,58,237,.55);
    }

    /* Cyber Network card */

    .cyber{
      background:
      linear-gradient(
        145deg,
        rgba(34,211,238,0.08),
        rgba(168,85,247,0.05)
      );
    }

    .cyber::before{
      background:
      linear-gradient(
        135deg,
        rgba(34,211,238,.18),
        rgba(168,85,247,.16),
        transparent
      );
    }

    .cyber h2{
      background:
      linear-gradient(
        90deg,
        #22d3ee,
        #a855f7,
        #ffffff
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .cyber a{
      background:
      linear-gradient(
        135deg,
        #22d3ee,
        #a855f7
      );

      box-shadow:
      0 12px 30px rgba(34,211,238,.30);
    }

    footer{
      text-align:center;

      padding:30px 20px;

      color:#94a3b8;

      font-size:.95rem;
    }

    @media(max-width:768px){

      header{
        padding-top:60px;
      }

      .container{
        padding:20px;
      }

      .card{
        width:100%;
        min-height:280px;

        padding:40px 24px;
      }

      .card h2{
        font-size:2.2rem;
      }

      .card a{
        font-size:1.05rem;
        padding:16px 30px;
      }

    }

  </style>
</head>

<body>

  <header>
    <h1>NSB Website Prototypes</h1>
    <p>Explore the demo and color scheme showcase</p>
  </header>

  <div class="container">

    <div class="card">
      <h2>Demo Website</h2>
      <a href="demo-site/index.html">View Demo</a>
    </div>

    <div class="card">
      <h2>Color Scheme Showcase</h2>
      <a href="color-schemes/index.html">View Schemes</a>
    </div>

  </div>

  <footer>
    © 2026 NSB Project
  </footer>

</body>
</html>
